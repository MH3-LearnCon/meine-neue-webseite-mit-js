name: Deploy Staging (neu.mh-learncon.com)

# Bei jedem Push auf main: statisch bauen und per FTPS zu netcup hochladen.
# Manueller Start über den "Run workflow"-Button ist ebenfalls möglich.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Niemals zwei Deploys gleichzeitig — der neueste gewinnt.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Statischen Export bauen
        run: pnpm build

      - name: lftp installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Per FTPS zu netcup deployen (lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # lftp beherrscht die TLS-Session-Wiederverwendung auf dem Datenkanal,
          # an der die JS-Action mit ECONNRESET scheiterte.
          lftp -c "
            set cmd:fail-exit yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:ssl-auth TLS;
            set ftp:passive-mode true;
            set ssl:verify-certificate no;
            set net:timeout 20;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open ftp://$FTP_HOST;
            user \"$FTP_USERNAME\" \"$FTP_PASSWORD\";
            mirror --reverse --delete --verbose --parallel=2 ./out/ ./;
            bye;
          "
